<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İsabet Okulları Skor Tablosu</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.header{
  display:flex;
  align-items:center;
  gap:15px;
  padding:20px;
}

.header img{
  height:70px;
}

.container{
  padding:20px;
}

.question{
  font-size:40px;
  margin:20px 0;
}

.timer{
  font-size:50px;
  color:#f97316;
}

button{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
  <!-- LOGO BURADA -->
  <img src="logo.png">
  <h1>İsabet Okulları Skor Tablosu</h1>
</div>

<div class="container">

<div class="timer" id="timer">00:00</div>

<div class="question" id="question">
Henüz soru yok
</div>

<button onclick="nextQuestion()">Sıradaki Soru</button>
<button onclick="startTimer()">Sayaç Başlat</button>

</div>

<script>

let questions = [
  {text:"2+2 kaçtır?", time:60},
  {text:"Üçgenin iç açıları toplamı?", time:120}
];

let current = -1;
let time = 0;
let interval;

function nextQuestion(){
  current++;
  if(current >= questions.length) current = 0;

  let q = questions[current];
  document.getElementById("question").innerText = q.text;

  time = q.time;
  updateTimer();
}

function startTimer(){
  clearInterval(interval);
  interval = setInterval(()=>{
    if(time > 0){
      time--;
      updateTimer();
    }
  },1000);
}

function updateTimer(){
  let min = Math.floor(time/60);
  let sec = time % 60;
  document.getElementById("timer").innerText =
    String(min).padStart(2,'0') + ":" + String(sec).padStart(2,'0');
}

</script>

</body>
</html>
