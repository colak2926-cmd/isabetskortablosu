<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İsabet Skor Tablosu</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.stage{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px}
.question{font-size:40px;font-weight:bold;margin-bottom:20px}
.answer{font-size:28px;display:none;margin-top:10px;color:#22c55e}
.controls{position:fixed;bottom:0;width:100%;background:#111;padding:10px;display:flex;justify-content:center;gap:10px}
button{padding:10px 15px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.next{background:#f97316;color:white}
.answerBtn{background:#334155;color:white}
.scoreBtn{background:#1d4ed8;color:white}
.scoreBoard{position:fixed;top:10px;right:10px;background:#111;padding:15px;border-radius:12px}
</style>
</head>
<body>

<div class="stage">
  <div id="question" class="question">Henüz soru yok</div>
  <div id="answer" class="answer">Cevap</div>
</div>

<div class="scoreBoard" id="scoreBoard"></div>

<div class="controls">
  <button class="next" onclick="nextQuestion()">Sıradaki</button>
  <button class="answerBtn" onclick="toggleAnswer()">Cevap</button>
</div>

<script>
let questions=[
 {q:"2+2 kaçtır?",a:"4"},
 {q:"Dünya kaçıncı gezegen?",a:"3"}
]

let index=0
let scores=[
 {name:"Grup A",score:0},
 {name:"Grup B",score:0}
]

function render(){
 document.getElementById("question").innerText=questions[index]?.q||"Bitti"
 document.getElementById("answer").innerText=questions[index]?.a||""
 renderScore()
}

function nextQuestion(){
 index++
 if(index>=questions.length) index=0
 document.getElementById("answer").style.display="none"
 render()
}

function toggleAnswer(){
 let el=document.getElementById("answer")
 el.style.display= el.style.display=="none"?"block":"none"
}

function addScore(i,point){
 scores[i].score+=point
 alert(scores[i].name+" +"+point+" puan!")
 renderScore()
}

function renderScore(){
 let html=""
 scores.sort((a,b)=>b.score-a.score)
 scores.forEach((g,i)=>{
 html+=`<div>${i+1}. ${g.name}: ${g.score} 
 <button onclick="addScore(${i},10)">+10</button>
 </div>`
 })
 document.getElementById("scoreBoard").innerHTML=html
}

render()
</script>

</body>
</html>
