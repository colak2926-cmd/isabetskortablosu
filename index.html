<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>İsabet Okulları Skor Tablosu</title>

<style>
/* BURAYA SENİN TÜM STYLE KODUN AYNI KALDI */
</style>
</head>

<body>
  <div class="container">
    <section class="card hero">
      <div class="hero-row">
        <div>
          <div class="eyebrow">🏆 İsabet Okulları</div>

          <!-- 🔥 LOGO EKLENDİ -->
          <div style="display:flex; align-items:center; gap:15px;">
            <img src="logo.jpeg" style="height:60px;">
            <h1>İsabet Okulları Skor Tablosu</h1>
          </div>

          <p>
            Soruları cevaplarıyla birlikte sisteme yükle, süre belirle, sırayla yayınla, yanda skor tablosunu gör,
            2 ile 15 grup arasında yarışmayı yönet ve puan ekledikçe sıralamanın anında değişmesini sağla.
          </p>
        </div>

        <div class="actions">
          <button class="btn btn-orange" id="showAnswerBtn">Cevabı Göster</button>
          <button class="btn btn-navy" id="announceWinnerBtn">Kazananı Açıkla</button>
          <button class="btn btn-soft" id="presentationBtn">Sunum Modu</button>
          <button class="btn btn-soft" id="homeBtn">Başlangıç Ekranı</button>
          <button class="btn btn-soft" id="fullscreenBtn">Tam Ekran</button>
          <button class="btn btn-soft" id="themeBtn">Koyu Tema</button>
          <button class="btn btn-soft" id="resetBtn">Puanları Sıfırla</button>
          <button class="btn btn-orange" id="shareBtn">Link Oluştur</button>
          <button class="btn btn-success" id="clearStorageBtn">Kayıtları Sıfırla</button>
        </div>
      </div>

      <div class="info-box" id="shareBox"></div>
    </section>

    <div class="layout">

      <!-- SOL PANEL AYNI -->
      <!-- ORTA SAHNE -->

      <section class="stage" id="stage">
        <div class="stage-inner">

          <div class="stage-head">
            <div class="pill pill-dark" id="stageQuestionTitle">Soru seçilmedi</div>

            <!-- 🔥 BURAYA DA LOGO EKLENDİ -->
            <div style="display:flex; align-items:center; gap:10px;">
              <img src="logo.jpeg" style="height:40px;">
              <div class="pill pill-orange">İsabet Okulları</div>
            </div>

          </div>

          <!-- GERİ KALAN HER ŞEY AYNI -->
        </div>
      </section>

      <!-- SAĞ PANEL AYNI -->

    </div>
  </div>

<script>
/* BURAYA SENİN TÜM JAVASCRIPT KODUN AYNI KALDI */
</script>

</body>
</html>
