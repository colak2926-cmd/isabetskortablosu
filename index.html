<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İsabet Okulları Skor Tablosu</title>

<style>
:root {
  --orange:#f97316;
  --navy:#0f172a;
  --card:#ffffff;
  --bg:#f8fafc;
  --text:#0f172a;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.container{
  padding:20px;
}

.header{
  display:flex;
  align-items:center;
  gap:15px;
  padding:20px;
  background:#1e293b;
  color:white;
}

.header img{
  height:70px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:var(--orange);
  color:white;
  cursor:pointer;
}

.question{
  font-size:35px;
  margin:20px 0;
}

.timer{
  font-size:50px;
  color:var(--orange);
}

.score{
  margin-top:20px;
}

.group{
  padding:10px;
  background:white;
  margin:5px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
  <!-- LOGO -->
  <img src="logo.jpg">
  <h1>İsabet Okulları Skor Tablosu</h1>
</div>

<div class="container">

<div class="timer" id="timer">00:00</div>

<div class="question" id="question">
Henüz soru yok
</div>

<button onclick="nextQuestion()">Sıradaki Soru</button>
<button onclick="startTimer()">Sayaç Başlat</button>

<h2>Gruplar</h2>

<input id="groupName" placeholder="Grup adı">
<button onclick="addGroup()">Ekle</button>

<div id="groups"></div>

</div>

<script>

let questions = [
  {text:"2+2 kaçtır?", time:60},
  {text:"Üçgenin iç açıları toplamı?", time:120}
];

let groups = [];

let current = -1;
let time = 0;
let interval;

function nextQuestion(){
  current++;
  if(current >= questions.length) current = 0;

  let q = questions[current];
  document.getElementById("question").innerText = q.text;

  time = q.time;
  updateTimer();
}

function startTimer(){
  clearInterval(interval);
  interval = setInterval(()=>{
    if(time > 0){
      time--;
      updateTimer();
    }
  },1000);
}

function updateTimer(){
  let min = Math.floor(time/60);
  let sec = time % 60;
  document.getElementById("timer").innerText =
    String(min).padStart(2,'0') + ":" + String(sec).padStart(2,'0');
}

function addGroup(){
  let name = document.getElementById("groupName").value;
  if(!name) return;

  groups.push({name:name, score:0});
  document.getElementById("groupName").value="";
  renderGroups();
}

function addScore(i){
  groups[i].score +=10;
  renderGroups();
}

function renderGroups(){
  let div = document.getElementById("groups");
  div.innerHTML="";

  groups.sort((a,b)=>b.score-a.score);

  groups.forEach((g,i)=>{
    div.innerHTML += `
      <div class="group">
        ${g.name} - ${g.score} puan
        <button onclick="addScore(${i})">+10</button>
      </div>
    `;
  });
}

</script>

</body>
</html>
