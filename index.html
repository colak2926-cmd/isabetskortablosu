<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İsabet Okulları Skor Tablosu</title>
  <style>
    :root {
      --orange: #f97316;
      --orange-dark: #ea580c;
      --navy: #0f172a;
      --soft: #f8fafc;
      --soft-2: #eef2ff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --card: #ffffff;
      --bg: #f8fafc;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    body.dark {
      --border: #334155;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --card: #0f172a;
      --bg: #020617;
      --soft: #111827;
      --soft-2: #1e293b;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.25s ease;
    }

    .container {
      max-width: 1500px;
      margin: 0 auto;
      padding: 22px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 26px;
      margin-bottom: 18px;
    }

    .hero-row {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .eyebrow {
      font-size: 14px;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 52px);
      line-height: 1.05;
    }

    .hero p {
      color: var(--muted);
      max-width: 850px;
      line-height: 1.6;
      margin: 12px 0 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button, input, textarea { font: inherit; }

    .btn {
      border: none;
      cursor: pointer;
      padding: 13px 16px;
      border-radius: 18px;
      font-weight: 800;
      transition: .18s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-orange { background: var(--orange); color: #fff; }
    .btn-orange:hover { background: var(--orange-dark); }
    .btn-navy { background: var(--navy); color: #fff; }
    .btn-soft { background: var(--soft-2); color: var(--text); }
    .btn-danger { background: #ef4444; color: #fff; }

    .info-box {
      display: none;
      margin-top: 14px;
      border-radius: 18px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      background: var(--soft);
      word-break: break-word;
    }

    .layout {
      display: grid;
      grid-template-columns: 430px 1fr 380px;
      gap: 18px;
      align-items: start;
    }

    .section { padding: 22px; }
    .section h2 { margin: 0 0 16px; font-size: 26px; }

    .field { display: grid; gap: 8px; margin-bottom: 12px; }
    .field label { font-size: 14px; font-weight: 800; color: var(--muted); }

    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 16px;
      padding: 13px 14px;
      outline: none;
    }

    textarea { min-height: 100px; resize: vertical; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .question-manager { display: grid; gap: 12px; }
    .question-list { display: grid; gap: 10px; max-height: 420px; overflow: auto; }

    .question-item {
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px;
      background: var(--soft);
    }

    .question-item.active {
      border-color: rgba(249,115,22,.55);
      box-shadow: 0 0 0 2px rgba(249,115,22,.12) inset;
    }

    .question-item-title {
      font-weight: 900;
      font-size: 18px;
      margin: 0 0 6px;
    }

    .question-item-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      margin: 0 0 10px;
    }

    .question-item-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .stage {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: var(--shadow);
      min-height: 760px;
      position: sticky;
      top: 18px;
    }

    .stage-inner { padding: 24px; }

    .presentation-controls {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(15,23,42,0.95);
      padding: 12px;
      z-index: 9999;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    body.presentation-mode .presentation-controls {
      display: flex;
    }

    .stage-head {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .pill {
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
    }
    .pill-dark { background: rgba(255,255,255,.1); }
    .pill-orange { background: rgba(249,115,22,.18); color: #fdba74; }

    .question-box {
      min-height: 320px;
      border-radius: 28px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      padding: 24px;
    }

    .question-label, .answer-label { color: #cbd5e1; font-weight: 800; font-size: 24px; }
    .question-text { margin-top: 12px; font-size: clamp(30px, 3vw, 48px); line-height: 1.2; font-weight: 900; }

    .question-image-wrap, .answer-image-wrap {
      margin-top: 18px;
      display: none;
      justify-content: center;
    }

    .question-image, .answer-image {
      max-width: 100%;
      max-height: 280px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.14);
      object-fit: contain;
      background: rgba(255,255,255,.04);
      padding: 8px;
    }

    .answer-box {
      display: none;
      margin-top: 16px;
      border-radius: 24px;
      padding: 20px;
      background: rgba(22,163,74,.16);
      border: 1px solid rgba(22,163,74,.35);
    }

    .answer-text { margin-top: 10px; font-size: clamp(24px, 2.5vw, 34px); font-weight: 900; }

    .announce-box {
      display: none;
      margin-top: 16px;
      border-radius: 24px;
      padding: 18px;
      background: rgba(249,115,22,.16);
      border: 1px solid rgba(249,115,22,.35);
      text-align: center;
      font-weight: 900;
      font-size: clamp(22px, 2.5vw, 34px);
    }

    .groups-add { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    .group-count { color: var(--muted); font-size: 13px; margin-top: 10px; }
    .groups-list, .score-list { display: grid; gap: 10px; }

    .group-card {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--soft);
      padding: 14px;
    }

    .group-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }

    .group-name { font-size: 19px; font-weight: 900; margin: 0; }
    .group-score { font-size: 14px; color: var(--muted); margin-top: 4px; }
    .score-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

    .score-entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-radius: 24px;
      border: 1px solid var(--border);
      padding: 16px;
      background: var(--card);
    }

    .score-entry.rank-1 {
      background: linear-gradient(135deg, rgba(249,115,22,.14), var(--card));
      border-color: rgba(249,115,22,.4);
      transform: scale(1.01);
    }
    .score-entry.rank-2 { margin-left: 14px; }
    .score-entry.rank-3 { margin-left: 28px; }
    .score-entry.rank-other { margin-left: 42px; }

    .score-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .rank-box {
      width: 48px; height: 48px; border-radius: 16px; flex-shrink: 0;
      display: grid; place-items: center; font-weight: 900; background: var(--soft-2);
    }
    .rank-1 .rank-box { background: #fed7aa; color: #9a3412; }
    .score-meta .name { margin: 0; font-size: 20px; font-weight: 900; }
    .score-meta .state { margin: 4px 0 0; font-size: 13px; color: var(--muted); }
    .score-value { text-align: right; font-size: 30px; font-weight: 900; }
    .score-value span { display: block; font-size: 11px; color: var(--muted); letter-spacing: 1px; }

    .winner-box {
      display: none;
      margin-top: 16px;
      padding: 22px;
      border-radius: 26px;
      border: 1px solid rgba(249,115,22,.35);
      background: linear-gradient(135deg, rgba(249,115,22,.14), var(--card));
      text-align: center;
    }
    .winner-title { margin: 0; font-size: clamp(30px, 3vw, 44px); font-weight: 900; }
    .winner-sub { margin-top: 10px; font-size: 22px; font-weight: 800; }

    .

  <button class="presenter-toggle" id="presenterToggleBtn">Kontrol Paneli</button>

  <div class="presenter-toolbar" id="presenterToolbar">
    <div class="presenter-head">
      <h3>Sunum Kontrol Paneli</h3>
      <button class="mini-pill-btn mini-pill-red" id="closePresenterBtn">Kapat</button>
    </div>
    <div class="presenter-body">
      <div class="presenter-card">
        <div class="presenter-mini-title">Hızlı Kontroller</div>
        <div class="presenter-actions" style="margin-top:0;">
          <button class="mini-pill-btn mini-pill-orange" id="presenterNextQuestionBtn">Sıradaki Soru</button>
          <button class="mini-pill-btn mini-pill-soft" id="presenterToggleAnswerBtn">Cevabı Aç</button>
          <button class="mini-pill-btn mini-pill-navy" id="presenterWinnerBtn">Kazananı Açıkla</button>
        </div>
      </div>

      <div class="presenter-card">
        <div class="presenter-mini-title">Sorular</div>
        <div class="presenter-grid" id="presenterQuestionList"></div>
      </div>

      <div class="presenter-card">
        <div class="presenter-mini-title">Puan Ver</div>
        <div class="presenter-grid" id="presenterGroupList"></div>
      </div>
    </div>
  </div>

  <div class="presentation-controls">
    <button class="btn btn-orange" id="presentNext">➡️ Sıradaki Soru</button>
    <button class="btn btn-soft" id="presentAnswer">👁️ Cevap</button>
  </div>

  <script>
    const state = {
      dark: false,
      answerVisible: false,
      presentationMode: false,
      presenterOpen: false,
      activeQuestionIndex: -1,
      questions: [
        {
          title: "Soru 1",
          text: "Bir üçgenin iç açılarının toplamı kaç derecedir?",
          answer: "180°",
          questionImage: "",
          answerImage: ""
        }
      ],
      groups: [
        { id: 1, name: "Grup A", score: 0 },
        { id: 2, name: "Grup B", score: 0 }
      ]
    };

    const $ = (id) => document.getElementById(id);
    const questionList = $("questionList");
    const groupsList = $("groupsList");
    const scoreList = $("scoreList");
    const shareBox = $("shareBox");
    const answerBox = $("answerBox");
    const announceBox = $("announceBox");
    const winnerBox = $("winnerBox");
    const presenterToolbar = $("presenterToolbar");
    const presenterToggleBtn = $("presenterToggleBtn");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve) => {
        if (!file) {
          resolve("");
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result || "");
        reader.onerror = () => resolve("");
        reader.readAsDataURL(file);
      });
    }

    function getActiveQuestion() {
      return state.questions[state.activeQuestionIndex] || null;
    }

    function sortGroups() {
      return [...state.groups].sort((a, b) => b.score - a.score || a.name.localeCompare(b.name, "tr"));
    }

    function renderStage() {
      const active = getActiveQuestion();
      $("stageQuestionTitle").textContent = active ? active.title : "Soru seçilmedi";
      $("stageQuestionText").textContent = active ? active.text : "Henüz soru yayınlanmadı.";
      $("stageAnswerText").textContent = active ? active.answer : "-";

      const qWrap = $("stageQuestionImageWrap");
      const qImg = $("stageQuestionImage");
      if (active && active.questionImage) {
        qImg.src = active.questionImage;
        qWrap.style.display = "flex";
      } else {
        qImg.removeAttribute("src");
        qWrap.style.display = "none";
      }

      const aWrap = $("stageAnswerImageWrap");
      const aImg = $("stageAnswerImage");
      if (active && active.answerImage) {
        aImg.src = active.answerImage;
        aWrap.style.display = "flex";
      } else {
        aImg.removeAttribute("src");
        aWrap.style.display = "none";
      }

      answerBox.style.display = state.answerVisible && active ? "block" : "none";
      $("showAnswerBtn").textContent = state.answerVisible ? "Cevabı Gizle" : "Cevabı Göster";
      
    }

    function renderQuestions() {
      questionList.innerHTML = "";
      state.questions.forEach((q, index) => {
        const item = document.createElement("div");
        item.className = `question-item ${index === state.activeQuestionIndex ? "active" : ""}`;
        item.innerHTML = `
          <div class="question-item-title">${escapeHtml(q.title)}</div>
          <p class="question-item-text">${escapeHtml(q.text)}</p>
          <div class="question-item-actions">
            <button class="btn btn-soft" data-publish="${index}">Yayınla</button>
            <button class="btn btn-soft" data-showanswer="${index}">Cevabı Aç</button>
            <button class="btn btn-danger" data-deletequestion="${index}">Sil</button>
          </div>
        `;
        questionList.appendChild(item);
      });

      questionList.querySelectorAll("[data-publish]").forEach((btn) => {
        btn.addEventListener("click", () => publishQuestion(Number(btn.dataset.publish)));
      });

      questionList.querySelectorAll("[data-showanswer]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.activeQuestionIndex = Number(btn.dataset.showanswer);
          state.answerVisible = true;
          renderAll();
        });
      });

      questionList.querySelectorAll("[data-deletequestion]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const index = Number(btn.dataset.deletequestion);
          state.questions.splice(index, 1);
          if (state.activeQuestionIndex === index) state.activeQuestionIndex = -1;
          if (state.activeQuestionIndex > index) state.activeQuestionIndex -= 1;
          hideAnnouncements();
          renderAll();
        });
      });
    }

    function renderPresenterQuestions() {
      const box = $("presenterQuestionList");
      box.innerHTML = "";
      state.questions.forEach((q, index) => {
        const item = document.createElement("div");
        item.className = `presenter-question-item ${index === state.activeQuestionIndex ? "active" : ""}`;
        item.innerHTML = `
          <div class="presenter-row">
            <div>
              <div class="presenter-name">${escapeHtml(q.title)}</div>
              <div class="presenter-sub">${escapeHtml(q.text).slice(0, 70)}${q.text.length > 70 ? "..." : ""}</div>
            </div>
          </div>
          <div class="presenter-actions">
            <button class="mini-pill-btn mini-pill-orange" data-presentpublish="${index}">Yayınla</button>
            <button class="mini-pill-btn mini-pill-soft" data-presentanswer="${index}">Cevabı Aç</button>
          </div>
        `;
        box.appendChild(item);
      });

      box.querySelectorAll("[data-presentpublish]").forEach((btn) => {
        btn.addEventListener("click", () => publishQuestion(Number(btn.dataset.presentpublish)));
      });

      box.querySelectorAll("[data-presentanswer]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.activeQuestionIndex = Number(btn.dataset.presentanswer);
          state.answerVisible = true;
          renderAll();
        });
      });
    }

    function updateGroupScore(id, point) {
      const target = state.groups.find((g) => g.id === id);
      if (!target) return;
      target.score = Math.max(0, target.score + point);
      if (point > 0) showPointAnnouncement(target.name, point);
      renderAll();
    }

    function renderGroups() {
      groupsList.innerHTML = "";
      $("groupCountText").textContent = `${state.groups.length} grup var. En az 2, en fazla 15 grup kullanabilirsin.`;

      state.groups.forEach((group) => {
        const card = document.createElement("div");
        card.className = "group-card";
        card.innerHTML = `
          <div class="group-top">
            <div>
              <p class="group-name">${escapeHtml(group.name)}</p>
              <div class="group-score">Puan: ${group.score}</div>
            </div>
            <button class="btn btn-danger" data-removegroup="${group.id}">Sil</button>
          </div>
          <div class="score-actions">
            <button class="btn btn-soft" data-point="1" data-id="${group.id}">+1</button>
            <button class="btn btn-soft" data-point="5" data-id="${group.id}">+5</button>
            <button class="btn btn-orange" data-point="10" data-id="${group.id}">+10</button>
            <button class="btn btn-navy" data-point="-5" data-id="${group.id}">-5</button>
          </div>
        `;
        groupsList.appendChild(card);
      });

      groupsList.querySelectorAll("[data-point]").forEach((btn) => {
        btn.addEventListener("click", () => updateGroupScore(Number(btn.dataset.id), Number(btn.dataset.point)));
      });

      groupsList.querySelectorAll("[data-removegroup]").forEach((btn) => {
        btn.addEventListener("click", () => {
          if (state.groups.length <= 2) {
            alert("En az 2 grup kalmalı.");
            return;
          }
          const id = Number(btn.dataset.removegroup);
          state.groups = state.groups.filter((g) => g.id !== id);
          renderAll();
        });
      });
    }

    function renderPresenterGroups() {
      const box = $("presenterGroupList");
      box.innerHTML = "";
      const ranking = sortGroups();
      ranking.forEach((group) => {
        const item = document.createElement("div");
        item.className = "presenter-group-item";
        item.innerHTML = `
          <div class="presenter-row">
            <div>
              <div class="presenter-name">${escapeHtml(group.name)}</div>
              <div class="presenter-sub">Puan: ${group.score}</div>
            </div>
          </div>
          <div class="presenter-actions">
            <button class="mini-pill-btn mini-pill-soft" data-presentpoint="1" data-id="${group.id}">+1</button>
            <button class="mini-pill-btn mini-pill-soft" data-presentpoint="5" data-id="${group.id}">+5</button>
            <button class="mini-pill-btn mini-pill-orange" data-presentpoint="10" data-id="${group.id}">+10</button>
            <button class="mini-pill-btn mini-pill-red" data-presentpoint="-5" data-id="${group.id}">-5</button>
          </div>
        `;
        box.appendChild(item);
      });

      box.querySelectorAll("[data-presentpoint]").forEach((btn) => {
        btn.addEventListener("click", () => updateGroupScore(Number(btn.dataset.id), Number(btn.dataset.presentpoint)));
      });
    }

    function renderScoreboard() {
      scoreList.innerHTML = "";
      const ranking = sortGroups();
      ranking.forEach((group, index) => {
        const row = document.createElement("div");
        row.className = `score-entry ${index === 0 ? "rank-1" : index === 1 ? "rank-2" : index === 2 ? "rank-3" : "rank-other"}`;
        row.innerHTML = `
          <div class="score-left">
            <div class="rank-box">${index + 1}</div>
            <div class="score-meta">
              <p class="name">${escapeHtml(group.name)}</p>
              <p class="state">${index === 0 ? "Lider" : `${index + 1}. sırada`}</p>
            </div>
          </div>
          <div class="score-value">${group.score}<span>PUAN</span></div>
        `;
        scoreList.appendChild(row);
      });
    }

    function showPointAnnouncement(groupName, point) {
      announceBox.style.display = "block";
      announceBox.textContent = `${groupName}, tebrikler! ${point} puan kazandınız.`;
      clearTimeout(showPointAnnouncement.timer);
      showPointAnnouncement.timer = setTimeout(() => {
        announceBox.style.display = "none";
      }, 2500);
    }

    function hideAnnouncements() {
      announceBox.style.display = "none";
      winnerBox.style.display = "none";
    }

    function renderWinner() {
      const ranking = sortGroups();
      if (!ranking.length) return;
      const top = ranking[0];
      const hasSingleWinner = ranking.length === 1 || top.score > ranking[1].score;
      $("winnerTitle").textContent = hasSingleWinner ? "Tebrikler, kazandınız!" : "Lider grup ekranda!";
      $("winnerSub").textContent = `${top.name} • ${top.score} puan`;
      winnerBox.style.display = "block";
    }

    function renderTheme() {
      document.body.classList.toggle("dark", state.dark);
      $("themeBtn").textContent = state.dark ? "Açık Tema" : "Koyu Tema";
    }

    function renderPresentationMode() {
      document.body.classList.toggle("presentation-mode", state.presentationMode);
      $("presentationBtn").textContent = state.presentationMode ? "Yönetim Modu" : "Sunum Modu";
    }

    function renderAll() {
      renderTheme();
      renderPresentationMode();
      renderQuestions();
      renderPresenterQuestions();
      renderStage();
      renderGroups();
      renderPresenterGroups();
      renderScoreboard();
    }

    function publishQuestion(index) {
      state.activeQuestionIndex = index;
      state.answerVisible = false;
      hideAnnouncements();
      renderAll();
    }

    async function addQuestion() {
      const title = $("newQuestionTitle").value.trim();
      const text = $("newQuestionText").value.trim();
      const answer = $("newAnswerText").value.trim();
      if (!title || !text || !answer) {
        alert("Soru başlığı, soru metni ve cevap alanını doldur.");
        return;
      }

      const questionImage = await readFileAsDataUrl($("newQuestionImage").files[0]);
      const answerImage = await readFileAsDataUrl($("newAnswerImage").files[0]);

      state.questions.push({ title, text, answer, questionImage, answerImage });
      $("newQuestionTitle").value = "";
      $("newQuestionText").value = "";
      $("newAnswerText").value = "";
      $("newQuestionImage").value = "";
      $("newAnswerImage").value = "";
      renderAll();
    }

    $("addQuestionBtn").addEventListener("click", addQuestion);

    function goNextQuestion() {
      if (!state.questions.length) return;
      if (state.activeQuestionIndex < state.questions.length - 1) {
        state.activeQuestionIndex += 1;
      } else {
        state.activeQuestionIndex = 0;
      }
      state.answerVisible = false;
      hideAnnouncements();
      renderAll();
    }

    $("nextQuestionBtn").addEventListener("click", goNextQuestion);
    

    function toggleAnswer() {
      if (state.activeQuestionIndex === -1) {
        alert("Önce bir soru yayınla.");
        return;
      }
      state.answerVisible = !state.answerVisible;
      renderStage();
    }

    $("showAnswerBtn").addEventListener("click", toggleAnswer);

    $("presentAnswer").addEventListener("click", toggleAnswer);

    $("presentNext").addEventListener("click", goNextQuestion);
    

    function showWinner() {
      renderWinner();
      winnerBox.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    $("announceWinnerBtn").addEventListener("click", showWinner);
    

    $("themeBtn").addEventListener("click", () => {
      state.dark = !state.dark;
      renderTheme();
    });

    $("presentationBtn").addEventListener("click", () => {
      state.presentationMode = !state.presentationMode;
      renderPresentationMode();
    });

    presenterToggleBtn.addEventListener("click", () => {
      state.presenterOpen = !state.presenterOpen;
      renderPresentationMode();
    });

    $("closePresenterBtn").addEventListener("click", () => {
      state.presenterOpen = false;
      renderPresentationMode();
    });

    $("fullscreenBtn").addEventListener("click", async () => {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (error) {
        console.error("Tam ekran açılamadı", error);
      }
    });

    $("resetBtn").addEventListener("click", () => {
      state.groups = state.groups.map((g) => ({ ...g, score: 0 }));
      hideAnnouncements();
      renderAll();
    });

    $("addGroupBtn").addEventListener("click", () => {
      const name = $("newGroupName").value.trim();
      if (!name) return;
      if (state.groups.length >= 15) {
        alert("En fazla 15 grup ekleyebilirsin.");
        return;
      }
      state.groups.push({ id: Date.now(), name, score: 0 });
      $("newGroupName").value = "";
      renderAll();
    });

    $("newGroupName").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        $("addGroupBtn").click();
      }
    });

    $("shareBtn").addEventListener("click", async () => {
      const payload = {
        dark: state.dark,
        answerVisible: state.answerVisible,
        presentationMode: state.presentationMode,
        activeQuestionIndex: state.activeQuestionIndex,
        questions: state.questions,
        groups: state.groups,
      };
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
      const url = `${window.location.origin}${window.location.pathname}?state=${encoded}`;
      shareBox.style.display = "block";
      shareBox.innerHTML = `Bağlantı hazır: <strong>${escapeHtml(url)}</strong>`;
      try {
        await navigator.clipboard.writeText(url);
        shareBox.innerHTML += "<br>Bağlantı panoya da kopyalandı.";
      } catch (e) {
        shareBox.innerHTML += "<br>Panoya otomatik kopyalanamadı. Elle kopyalayabilirsin.";
      }
    });

    function loadFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("state");
      if (!raw) return;
      try {
        const parsed = JSON.parse(decodeURIComponent(escape(atob(raw))));
        if (typeof parsed.dark === "boolean") state.dark = parsed.dark;
        if (typeof parsed.answerVisible === "boolean") state.answerVisible = parsed.answerVisible;
        if (typeof parsed.presentationMode === "boolean") state.presentationMode = parsed.presentationMode;
        if (typeof parsed.activeQuestionIndex === "number") state.activeQuestionIndex = parsed.activeQuestionIndex;
        if (Array.isArray(parsed.questions)) state.questions = parsed.questions;
        if (Array.isArray(parsed.groups)) state.groups = parsed.groups;
      } catch (err) {
        console.error("Bağlantı verisi okunamadı", err);
      }
    }

    loadFromUrl();
    renderAll();
  </script>
</body>
</html>
